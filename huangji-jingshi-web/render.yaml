# Render 部署配置 - 仅后端服务（前端已部署在 Vercel）

services:
  # 后端服务
  - type: web
    name: hjjs-backend
    env: rust
    plan: free
    rootDir: huangji-jingshi-web
    buildCommand: python3 -m venv /opt/render/project/src/.venv && /opt/render/project/src/.venv/bin/pip install --upgrade pip && /opt/render/project/src/.venv/bin/pip install sxtwl && cargo build --release
    startCommand: ./target/release/backend
    healthCheckPath: /health
    envVars:
      - key: RUST_LOG
        value: info
      - key: BAZI_PYTHON_BIN
        value: /opt/render/project/src/.venv/bin/python
